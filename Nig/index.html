<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lista zakupów</title>

    <!-- Bootstrap (dla klas list-group-item, active) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- jQuery UI (drag & drop) -->
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <link rel="stylesheet" href="style.css">
</head>
<body class="container mt-4">

    <h1>Lista zakupów</h1>

    <div class="mb-3">
        <input type="text" id="productInput" class="form-control" placeholder="Wpisz nazwę produktu">
    </div>

    <div class="mb-3">
        <button id="addProduct" class="btn btn-primary">Dodaj produkt</button>
        <button id="addFirst" class="btn btn-secondary">Dodaj na początku</button>
        <button id="addLast" class="btn btn-secondary">Dodaj na końcu</button>
        <button id="removeLast" class="btn btn-danger">Usuń ostatni produkt</button>
        <button id="clearList" class="btn btn-warning">Wyczyść listę</button>
        <button id="restoreList" class="btn btn-success">Przywróć listę</button>
        <button id="colorEven" class="btn btn-info">Pokoloruj co drugi element</button>
        <button id="sortAZ" class="btn btn-dark">Sortuj alfabetycznie</button>
    </div>

    <div class="mb-3">
        <input type="text" id="filterInput" class="form-control" placeholder="Filtruj produkty">
    </div>

    <ul id="shoppingList" class="list-group">
        <li class="list-group-item">Chleb</li>
        <li class="list-group-item">Mleko</li>
        <li class="list-group-item">Jajka</li>
    </ul>

    <script src="script.js"></script>
</body>
</html>
